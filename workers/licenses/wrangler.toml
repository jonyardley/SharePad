# Rate limiting for /recover is enforced by a Cloudflare dashboard rule
# (Security → WAF → Rate limiting rules), not in-worker:
#   - Match: hostname = <licences worker host>, URI path starts with "/recover"
#   - Rate: 5 requests / 1 minute, per client IP
#   - Action: Block (or Managed Challenge), 60s timeout
# Rationale: /recover is an unauthenticated purchase-enumeration oracle and each
# probe costs a Stripe API call (specs/licensing.md §8.5).

name = "sharepad-licenses"
main = "src/index.mjs"
compatibility_date = "2026-06-01"

# Capture logs/metrics for the money-path /key + /recover routes (Stripe calls,
# key issuance) so abuse and outages are visible/alertable. 100% sampling is fine
# at this volume.
[observability]
enabled = true
head_sampling_rate = 1
