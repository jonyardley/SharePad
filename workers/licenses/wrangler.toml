# /recover rate limiting is in-worker (the binding below), not a WAF dashboard
# rule — those need a zone/custom domain and don't apply to the workers.dev
# subdomain. /recover is an unauthenticated purchase-enumeration oracle and each
# probe costs a Stripe API call (specs/licensing.md §8).

name = "sharepad-licenses"
main = "src/index.mjs"
compatibility_date = "2026-06-01"

[[ratelimits]]
name = "RECOVER_LIMITER"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 5
  period = 60

# Capture logs/metrics for the money-path /key + /recover routes (Stripe calls,
# key issuance) so abuse and outages are visible/alertable. 100% sampling is fine
# at this volume.
[observability]
enabled = true
head_sampling_rate = 1
