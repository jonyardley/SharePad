name = "sharepad-purchase-email"
main = "src/worker.js"
compatibility_date = "2026-06-01"

# Public, non-secret config. Override per-environment if needed.
[vars]
# The ?owner param puts the thank-you page into its re-download view (a plain
# download, no buy prompt). Without it, buyers land on the stumble/buy view.
DOWNLOAD_URL = "https://sharepad.co/thanks-a7f3c92b.html?owner"
EMAIL_FROM = "SharePad <hello@sharepad.co>"

# Secrets are NOT set here. Add them with `wrangler secret put`:
#   wrangler secret put STRIPE_WEBHOOK_SECRET   # whsec_… from the Stripe webhook endpoint
#   wrangler secret put RESEND_API_KEY          # re_… from Resend
