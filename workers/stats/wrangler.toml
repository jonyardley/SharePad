# Unified stats dashboard (specs/stats-dashboard.md). Queries GitHub Releases,
# Analytics Engine, Web Analytics, and Stripe server-side and renders one page at
# stats.sharepad.co. Gated by DASHBOARD_TOKEN (+ Cloudflare Access, recommended).
name = "sharepad-stats"
main = "src/index.mjs"
compatibility_date = "2026-06-01"

routes = [
  { pattern = "stats.sharepad.co", custom_domain = true },
]

# Public/non-secret config. Secrets (DASHBOARD_TOKEN, CF_API_TOKEN, STRIPE_API_KEY)
# are set via `wrangler secret` / the deploy workflow — never committed.
[vars]
CF_ACCOUNT_ID = "b232fe74d0fd6056b69aeaa6a79c51b7"
GITHUB_REPO = "jonyardley/SharePad"
AE_DATASET = "sharepad_appcast"
# Cloudflare Access (SSO) — public identifiers, not secrets. A valid Access JWT for
# this app authorizes the dashboard without DASHBOARD_TOKEN (specs/stats-dashboard.md).
ACCESS_TEAM_DOMAIN = "crimson-hat-8d79.cloudflareaccess.com"
ACCESS_AUD = "2da74d2f290d952cffc0528a5bab65c13db1e191087f73e742b1f8b21f3c9b34"

[observability]
enabled = true
head_sampling_rate = 1
