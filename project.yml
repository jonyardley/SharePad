# xcodegen spec — the .xcodeproj is generated (git-ignored). Edit this, run `just gen`.
name: SharePad

options:
  minimumXcodeGenVersion: "2.40.0"
  bundleIdPrefix: com.jonyardley
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.2"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  SharePad:
    type: application
    platform: macOS
    sources:
      - Sources/SharePad
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonyardley.sharepad
        CODE_SIGN_STYLE: Manual
        # Default to ad-hoc so credential-free local/CI builds work; the release
        # recipe overrides the identity + adds --timestamp for Developer ID signing.
        CODE_SIGN_IDENTITY: "-"
        # Required for notarization. Works with ad-hoc signing too, so the Step 1
        # on-iPad verification can confirm the camera entitlement before any cert.
        ENABLE_HARDENED_RUNTIME: "YES"
        CODE_SIGN_ENTITLEMENTS: Sources/SharePad/SharePad.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # Explicit Info.plist (not GENERATE_INFOPLIST_FILE) because Sparkle's SU* keys are
    # custom — Xcode's INFOPLIST_KEY_* only emits Apple's allowlisted keys. xcodegen
    # fills the standard bundle/version keys; we add the rest here. The plist is
    # generated (git-ignored) — regenerated by `just gen` before every build.
    info:
      path: Sources/SharePad/Info.plist
      properties:
        # Bind to the build settings so the release recipe's tag-driven
        # MARKETING_VERSION / CURRENT_PROJECT_VERSION flow into the bundle (Sparkle
        # compares these). xcodegen's literal defaults would pin them to 1.0 / 1.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true
        CFBundleDisplayName: SharePad
        NSHumanReadableCopyright: © 2026 Jon Yardley
        NSCameraUsageDescription: SharePad displays your connected iPad's screen.
        # Sparkle auto-update (specs/distribution.md §7). SUPublicEDKey is the
        # production EdDSA public key (safe to commit); its matching private key is
        # the SPARKLE_ED_PRIVATE_KEY CI secret used to sign the appcast.
        SUFeedURL: https://jonyardley.github.io/SharePad/appcast.xml
        SUPublicEDKey: dENS5eDuSc3QhXyD4HZ115jBNiZGK3gGbaVehtrk5yM=
        SUEnableAutomaticChecks: true
    scheme:
      testTargets:
        - SharePadTests

  SharePadTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/SharePadTests
    dependencies:
      - target: SharePad
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.jonyardley.SharePadTests
