name: Release

# Tag-driven release: build → Developer ID sign → notarize → DMG → GitHub Release.
# See specs/distribution.md §8. Requires the repo secrets listed on the steps below.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release and upload the DMG

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, notarize & release
    runs-on: macos-26 # pinned to match local: arm64 + Xcode 26.x → Swift 6
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6

      # Fail before any signing/notarization spend if the CHANGELOG wasn't bumped.
      # `sparkle-appcast` embeds the topmost `## ` section verbatim as the update's
      # release notes, so a stale top section silently ships the previous version's
      # notes. Tags are `vX.Y.Z`; CHANGELOG headings are `## X.Y.Z` (no `v`).
      - name: Verify CHANGELOG matches tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          TOP=$(grep -m1 '^## ' CHANGELOG.md | sed 's/^##[[:space:]]*//')
          if [ "$TOP" != "$VERSION" ]; then
            echo "::error::CHANGELOG.md top section is '$TOP' but releasing '$VERSION'. Add a '## $VERSION' section at the top before tagging." >&2
            exit 1
          fi
          echo "CHANGELOG top section matches $VERSION."

      - name: Install tools
        run: brew install xcodegen just create-dmg

      # Import the Developer ID Application cert into a throwaway keychain.
      - name: Import signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Write notarization API key
        env:
          AC_API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          echo "$AC_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/ac_api_key.p8"

      # TAG drives the user-visible version; RELEASE_VERSION strips the leading "v"
      # so the DMG's MARKETING_VERSION matches the tag. Both via env, never inlined
      # into the script body (workflow-injection guidance). On a manual
      # workflow_dispatch (no tag) the build still runs as a dry-run; the publish
      # step below is skipped, so a branch name landing in the version is harmless.
      - name: Build, sign, notarize & package
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_PATH: ${{ runner.temp }}/ac_api_key.p8
          BUILD_NUMBER: ${{ github.run_number }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          export RELEASE_VERSION="${TAG#v}"
          just release

      # Same camera-only / un-sandboxed guard as CI, on the actual shipped binary.
      - name: Verify app invariants
        run: just verify-app .build/Build/Products/Release/SharePad.app

      # Generate + EdDSA-sign the Sparkle appcast. DMG and appcast are published to
      # the gh-pages branch (GitHub Pages), so the Releases page shows only source
      # archives — not the compiled binary.
      - name: Generate Sparkle appcast
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          export SPARKLE_ED_KEY_PATH="$RUNNER_TEMP/sparkle_ed_key"
          trap 'rm -f "$SPARKLE_ED_KEY_PATH"' EXIT
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$SPARKLE_ED_KEY_PATH"
          export DOWNLOAD_URL_PREFIX="https://jonyardley.github.io/SharePad/"
          just sparkle-appcast

      # Smoke-check the signed/stapled artifacts + appcast before they reach the
      # auto-updater. Fails the release rather than shipping a broken update.
      - name: Verify release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        run: just verify-release

      # Push DMG + appcast to gh-pages so GitHub Pages serves them. The gh-pages
      # branch is not protected, so the Actions bot can push directly.
      - name: Publish DMG + appcast to gh-pages
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages gh-pages
          git config --global --add safe.directory /tmp/gh-pages
          cp .build/SharePad.dmg /tmp/gh-pages/SharePad.dmg
          cp .build/appcast/appcast.xml /tmp/gh-pages/appcast.xml
          cd /tmp/gh-pages
          git add SharePad.dmg appcast.xml
          git commit -m "Release $TAG: update DMG + appcast [skip ci]"
          git push origin gh-pages

      # Create the GitHub Release. The DMG is NOT attached (served from gh-pages).
      # appcast.xml IS attached so that v1.0.x installs (whose SUFeedURL points at
      # releases/latest/download/appcast.xml) can still auto-update to newer builds.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$TAG" .build/appcast/appcast.xml --title "$TAG" --generate-notes
