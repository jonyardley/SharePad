name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref — saves macOS minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    name: Lint, Build & Test
    runs-on: macos-26 # pinned to match local: arm64 + Xcode 26.x → Swift 6
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      # Keyed on project.yml; SPM re-resolves over a stale cache, so a moved pin
      # stays correct (a same-range `from:` bump won't change the key — the cache
      # just lags until project.yml next changes, never shipping the wrong version).
      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # swiftlint isn't on the macos-26 arm64 image (actions/runner-images#10595); swiftformat is.
      - name: Install tools
        run: brew install xcodegen just swiftlint

      - name: Lint
        run: just lint

      # `just test` compiles the app + test bundle and runs the suite, so it
      # subsumes `just build` — one compile pass keeps macOS minutes down.
      - name: Build & test
        run: just test

      - name: Coverage summary
        run: just coverage
