name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref — saves macOS minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: macos-26 # pinned to match local: arm64 + Xcode 26.x → Swift 6
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      # swiftlint isn't on the macos-26 arm64 image (actions/runner-images#10595); swiftformat is.
      - name: Install tools
        run: brew install xcodegen just swiftlint

      - name: Lint
        run: just lint

      - name: Build
        run: just build
