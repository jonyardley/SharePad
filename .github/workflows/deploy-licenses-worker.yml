name: Deploy Licenses Worker

# Deploy the sharepad-licenses Cloudflare Worker (the /key + /recover licence
# endpoints) whenever its code changes on main, or on manual dispatch. Runtime
# secrets are synced from GitHub Actions secrets, so GitHub is the single source
# of truth — no manual `wrangler secret put`.
on:
  push:
    branches: [main]
    paths:
      - "workers/licenses/**"
      - ".github/workflows/deploy-licenses-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy sharepad-licenses Worker
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Test
        working-directory: workers/licenses
        run: npm test

      # Block the deploy if the signing key doesn't pair with the app's embedded
      # public key — the bug from #108, where the worker minted keys every shipped
      # build rejected. Catches a stale embedded key, a wrong/rotated secret, or a
      # newline-corrupted secret. Only the derived public key is printed.
      - name: Verify signing key pairs with the app
        env:
          ED25519_PRIVATE_KEY: ${{ secrets.ED25519_PRIVATE_KEY }}
        run: node scripts/check-key-pairing.mjs

      # Deploy + sync the required secrets. ED25519_PRIVATE_KEY must be the same
      # value as the purchase-email Worker and pair with the public key embedded
      # in the app; STRIPE_API_KEY is the restricted "Checkout Sessions: read" key;
      # RESEND_API_KEY (same value as the purchase-email Worker) lets /recover email
      # the key instead of rendering it (specs/recover-email-delivery.md). If any
      # GitHub secret is unset the deploy fails loudly, which is correct.
      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/licenses
          secrets: |
            ED25519_PRIVATE_KEY
            STRIPE_API_KEY
            RESEND_API_KEY
        env:
          ED25519_PRIVATE_KEY: ${{ secrets.ED25519_PRIVATE_KEY }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
