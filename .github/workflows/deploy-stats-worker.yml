name: Deploy Stats Worker

# Deploy the sharepad-stats dashboard Worker (specs/stats-dashboard.md) on changes
# to its folder, or on manual dispatch. Runtime secrets are synced from GitHub
# Actions secrets, so GitHub is the single source of truth.
on:
  push:
    branches: [main]
    paths:
      - "workers/stats/**"
      - ".github/workflows/deploy-stats-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy sharepad-stats Worker
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Test
        working-directory: workers/stats
        run: npm test

      # First deploy provisions the stats.sharepad.co custom domain (same zone-perm
      # token that already provisioned appcast.sharepad.co).
      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/stats

      # Sync each Worker secret only if its GitHub secret is set — so the deploy
      # never fails on an absent one, and the matching card just shows "not
      # configured" until it's added. (wrangler-action's `secrets:` block hard-fails
      # on any missing value, which is why we sync them here instead.)
      #   DASHBOARD_TOKEN   — the access gate (required to serve data)
      #   CF_API_TOKEN      — Account Analytics: Read (AE SQL + Web Analytics RUM)
      #   STRIPE_API_KEY    — Checkout Sessions: read (reused from the other workers)
      - name: Sync secrets (each, if set)
        working-directory: workers/stats
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DASHBOARD_TOKEN: ${{ secrets.STATS_DASHBOARD_TOKEN }}
          CF_API_TOKEN: ${{ secrets.STATS_ANALYTICS_TOKEN }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
        run: |
          set -euo pipefail
          put() {
            if [ -n "${2:-}" ]; then
              printf '%s' "$2" | npx --yes wrangler@4 secret put "$1"
            else
              echo "::notice::$1 not set — skipping; its dashboard card shows 'not configured'."
            fi
          }
          put DASHBOARD_TOKEN "${DASHBOARD_TOKEN:-}"
          put CF_API_TOKEN "${CF_API_TOKEN:-}"
          put STRIPE_API_KEY "${STRIPE_API_KEY:-}"
