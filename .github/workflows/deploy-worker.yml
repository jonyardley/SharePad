name: Deploy Worker

# Deploy the purchase-email Cloudflare Worker whenever its code changes on main
# (or on manual dispatch). Worker runtime secrets are synced from GitHub Actions
# secrets, so GitHub is the single source of truth — no manual `wrangler secret put`.
on:
  push:
    branches: [main]
    paths:
      - "workers/purchase-email/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy purchase-email Worker
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Test
        working-directory: workers/purchase-email
        run: npm test

      # Block the deploy if the signing key doesn't pair with the app's embedded
      # public key — the bug from #108, where the worker minted keys every shipped
      # build rejected. Catches a stale embedded key, a wrong/rotated secret, or a
      # newline-corrupted secret. Only the derived public key is printed.
      - name: Verify signing key pairs with the app
        env:
          ED25519_PRIVATE_KEY: ${{ secrets.ED25519_PRIVATE_KEY }}
        run: node scripts/check-key-pairing.mjs

      # Deploy + sync the required secrets. RESEND_API_KEY (Resend send) and
      # ED25519_PRIVATE_KEY (signs the licence key carried in the email — same value
      # as the sharepad-licenses Worker, pairs with the app's embedded public key)
      # are both required; if either is unset the deploy fails loudly, which is correct.
      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/purchase-email
          secrets: |
            RESEND_API_KEY
            ED25519_PRIVATE_KEY
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ED25519_PRIVATE_KEY: ${{ secrets.ED25519_PRIVATE_KEY }}

      # STRIPE_WEBHOOK_SECRET is created only AFTER the Worker first exists (its URL
      # is needed to register the Stripe webhook), so it's absent on the first
      # deploy. Guard it: sync when present, skip otherwise. The Worker safely
      # rejects every webhook while the secret is unset, so skipping is harmless.
      - name: Sync Stripe webhook secret (if set)
        working-directory: workers/purchase-email
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          if [ -n "${STRIPE_WEBHOOK_SECRET:-}" ]; then
            printf '%s' "$STRIPE_WEBHOOK_SECRET" | npx --yes wrangler@3 secret put STRIPE_WEBHOOK_SECRET
          else
            echo "::notice::STRIPE_WEBHOOK_SECRET not set yet — skipping. The Worker rejects all webhooks until it is set."
          fi
